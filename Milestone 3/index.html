    <template id="ordersTemplate">
       
        <div class="container">
            <h1 class="text-center mb-4">Orders</h1>
            <div class="row">
                <div class="col-md-12">
                    <h3>Menu</h3>
                    <table class="table table-bordered table-striped">
                        <thead class="thead-dark">
                            <tr>
                                <th>Item Code</th>
                                <th>Item Name</th>
                                <th>Price (LKR)</th>
                                <th>Discount</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable">
                            <!-- Product items will be dynamically inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        
            <div class="row mt-4">
                <div class="col-md-6">
                    <h3>Customer Details</h3>
                    <form id="customerDetailsForm">
                        <div class="form-group">
                            <label for="customerName">Name</label>
                            <input type="text" class="form-control" id="customerName" required>
                        </div>
                        <div class="form-group">
                            <label for="customerEmail">Email</label>
                            <input type="email" class="form-control" id="customerEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">Phone Number</label>
                            <input type="text" class="form-control" id="customerPhone" required>
                        </div>
                    </form>
                </div>
            </div>
        
            <div class="row mt-4">
                <div class="col-md-6">
                    <h3>Add Item to Bill</h3>
                    <form id="addItemToBillForm">
                        <div class="form-group">
                            <label for="billItemCode">Item Code</label>
                            <input type="text" class="form-control" id="billItemCode" required>
                        </div>
                        <div class="form-group">
                            <label for="billItemName">Item Name</label>
                            <input type="text" class="form-control" id="billItemName" readonly>
                        </div>
                        <div class="form-group">
                            <label for="billItemPrice">Price (LKR)</label>
                            <input type="text" class="form-control" id="billItemPrice" readonly>
                        </div>
                        <div class="form-group">
                            <label for="billItemQty">Qty</label>
                            <input type="number" class="form-control" id="billItemQty" required>
                        </div>
                        <div class="form-group">
                            <label for="billItemDiscount">Discount (%)</label>
                            <input type="text" class="form-control" id="billItemDiscount" readonly>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="addItemToBill()">Add Item to Bill</button>
                        <button type="button" class="btn btn-danger" onclick="removeItem()">Remove Item</button>
                    </form>
                </div>
            </div>
        
            <div class="row mt-4">
                <div class="col-md-12">
                    <h3>Bill Summary</h3>
                    <div id="billSummary">
                        <table class="table table-bordered">
                            <thead class="thead-dark">
                                <tr>
                                    <th>Item Name</th>
                                    <th>Price (LKR)</th>
                                    <th>Qty</th>
                                    <th>Discount (%)</th>
                                </tr>
                            </thead>
                            <tbody id="billItemsTable">
                                <!-- Bill items will be dynamically inserted here -->
                            </tbody>
                        </table>
                        <p>Subtotal: <span id="subtotalDisplay">0.00</span> LKR</p>
                        <p>Total Discount: <span id="totalDiscountDisplay">0.00</span> LKR</p>
                        <p>Total: <span id="totalDisplay">0.00</span> LKR</p>
                        <button type="button" class="btn btn-info" id="displayBill">Print Bill</button>
                    </div>
                </div>
            </div>
        </div>
        
    </template>
